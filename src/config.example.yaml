BOT_TOKEN: "Your-bot-token"
#PAYMENT_TOKEN: "39054xxxx:LIVE:45xxx"  # payment token from @BotFather
ADMINS: [1234567890]

XUI_API_URL: "http://ip-or-domain:2053"
XUI_BASE_PATH: "/panel"
# API-токен из панели 3x-ui: Settings → API Keys → Generate API Key
XUI_API_TOKEN: ""
XUI_SUB_PORT: "2096"
XUI_VERIFY_SSL: false

SUBSCRIPTION_URL_BASE: "ip-or-domain"
SUB_BASE_PATH: "/sub"

# ──────────────────────────────────────────────────────────────
# Профили: ID инбаундов через запятую (из панели 3x-ui)
# Протокол определяется автоматически из панели
# ──────────────────────────────────────────────────────────────
# Стандартный профиль (безлимит) — основной
STANDARD_INBOUNDS: "1"
# WL-профиль (whitelist) — для мобильных сетей с белыми списками
# Оставьте пустым если WL-профиль не нужен
WL_INBOUNDS: "3"
# Лимит трафика для WL-профиля в ГБ (0 = безлимит)
WL_TRAFFIC_LIMIT_GB: 50
# Лимит трафика для WL-профиля в ГБ на период пробного периода (0 = использовать WL_TRAFFIC_LIMIT_GB)
TRIAL_WL_TRAFFIC_LIMIT_GB: 5
# Лимит трафика для стандартного профиля в ГБ (0 = безлимит)
STANDARD_TRAFFIC_LIMIT_GB: 0
# Лимит одновременных IP для стандартного профиля (0 = безлимит)
STANDARD_IP_LIMIT: 0
# Лимит одновременных IP для WL-профиля (0 = безлимит)
WL_IP_LIMIT: 0

TRIAL_DAYS: 3

# ──────────────────────────────────────────────────────────────
# Tribute (опционально — второй способ оплаты через tribute.tg)
# Как получить API-ключ:
#   Tribute Dashboard → ⋮ → Settings → API Keys → Generate API Key
# Webhook URL прописать там же:
#   https://your-domain.com:8081/tribute/webhook
# ──────────────────────────────────────────────────────────────
TRIBUTE_API_KEY: ""
TRIBUTE_WEBHOOK_PORT: 8081

# Подписки Tribute: список объектов {name, url, referral_reward_hours}
# name: точное название плана в Tribute Dashboard
# url: ссылка «Поделиться» из Tribute Dashboard
# referral_reward_hours: сколько часов начислять рефереру при каждой оплате (0 = без награды)
# Если список пуст — кнопки подписок Tribute не появляются в боте
TRIBUTE_SUBSCRIPTIONS: []
