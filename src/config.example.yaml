#    url: "https://tribute.tg/..."
#    referral_reward_hours: 120
#  - name: "VPN 3 Months"
#    url: "https://tribute.tg/..."
#    referral_reward_hours: 360

# Цифровые товары: список объектов {name, hours, price, url, referral_reward_hours}
# hours: срок подписки в часах
# price: цена в рублях (отображается в кнопке выбора периода; 0 = цена не показывается)
# url опционален — если задан, кнопка товара появится в меню «Продлить»
# referral_reward_hours: сколько часов начислять рефереру при покупке товара (0 = без награды)
# Имена должны быть уникальны
TRIBUTE_DIGITAL_PRODUCTS: []
