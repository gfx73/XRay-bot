services:
  bot:
    build: .
    env_file: ./src/.env
    volumes:
      - ./src:/app/src
      - ./users.db:/app/users.db
    restart: unless-stopped
    # Uncomment to expose Tribute webhook (TRIBUTE_WEBHOOK_PORT in .env, default 8081):
    ports:
      - "${TRIBUTE_WEBHOOK_PORT:-8081}:${TRIBUTE_WEBHOOK_PORT:-8081}"
